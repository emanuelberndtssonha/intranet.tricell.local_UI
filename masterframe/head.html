	<script language="JavaScript" type="text/javascript" src="/scripts/leftmenu.js"></script>
	<script language="JavaScript" src="/scripts/MD5.js"></script>

	<script language="JavaScript">
		let keys = { t: false, r: false };

		addEventListener("keydown", (event) => {
			if (event.key === "t") {
				keys.t = true;
			}
			if (event.key === "r") {
				keys.r = true;
			}
			if (keys.t && keys.r) {
				document.getElementById("loginMenu").style.display = "flex";
			}
		});

		addEventListener("keyup", (event) => {
			if (event.key === "t") {
				keys.t = false;
			}
			if (event.key === "r") {
				keys.r = false;
			}
		});

		document.addEventListener("keydown", event => {
			if (event.key == "Escape") {
				document.getElementById("loginMenu").style.display = "none";
			}
		});

		function hashing() {
			document.form.fpassword.value = hex_md5(document.form.fpassword.value);
		}

		function formCheck() {
			if (document.form.femployeecode.value == "") {
				alert("You must give an employee code!");
				return false;
			}
			if (document.form.fpassword.value == "") {
				alert("You must give a password!");
				return false;
			}
		}
	</script>
